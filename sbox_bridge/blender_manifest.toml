schema_version = "1.0.0"

id = "sbox_bridge"
version = "2.1.0"
name = "s&box Bridge"
tagline = "Bidirectional scene sync between Blender and the s&box game engine"
maintainer = "SanicTehHedgehog <gameingmaster86@gmail.com>"
type = "add-on"

# Blender version requirements
blender_version_min = "4.2.0"

# License
license = ["SPDX:GPL-3.0-or-later"]

# Website
website = "https://github.com/SanicTehHedgehog/blender-sbox-bridge"

# Description
description = "Stream meshes, lights, materials, and transforms between Blender and s&box in real time. Place objects in either editor and they appear in both."

# Tags (from Blender's allowed tag list)
tags = ["Import-Export", "3D View", "Scene"]

# No external dependencies - stdlib only
# [permissions]
